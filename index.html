<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK1 CORE | Hamza Baba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 rounded-3xl border-2 border-blue-600 p-8 shadow-2xl">
        <h1 class="text-center text-4xl font-black text-blue-500 mb-8">TK1 CORE</h1>
        <div>
            <h2 class="text-green-400 text-sm font-bold mb-2">📥 FAST DOWNLOADER</h2>
            <input id="v_url" type="text" placeholder="لنک یہاں ڈالیں..." class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none border border-transparent focus:border-green-500 text-left text-white">
            <button onclick="runDL()" id="btn_dl" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase hover:bg-green-700 active:scale-95">Get Link</button>
            <div id="res_area" class="mt-4 hidden text-center">
                <a id="final_link" href="#" target="_blank" class="bg-blue-600 px-10 py-4 rounded-full font-bold inline-block">⚡ DOWNLOAD NOW</a>
            </div>
        </div>
    </div>

    <script>
        // عثمان صاحب، یہاں آپ کا وہ 'Direct URL' ہے جو تصویر میں تھا
        const API = "https://usmansp-hamzababa-engine.hf.space";

        async function runDL() {
            const val = document.getElementById('v_url').value;
            const btn = document.getElementById('btn_dl');
            if(!val) return alert("لنک غائب ہے!");
            
            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                // یہ لائن اب بالکل درست طریقے سے لکھی گئی ہے
                const response = await fetch(`${API}/download?url=${encodeURIComponent(val)}`);
                const data = await response.json();

                if(data.status === 'success') {
                    document.getElementById('final_link').href = data.link;
                    document.getElementById('res_area').classList.remove('hidden');
                    btn.innerText = "SUCCESS!";
                } else {
                    alert("سرور مصروف ہے، دوبارہ کوشش کریں۔");
                    resetBtn(btn);
                }
            } catch(error) { 
                alert("کنکشن فیل! براؤزر کا کیشے صاف کر کے دوبارہ چیک کریں۔");
                resetBtn(btn);
            }
        }

        function resetBtn(btn) {
            btn.innerText = "RETRY";
            btn.disabled = false;
        }
    </script>
</body>
</html>
