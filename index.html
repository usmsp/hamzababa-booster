<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Baba Media</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 400px; border: 1px solid #334155; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .dl-btn { display: inline-block; background: #22c55e; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>HAMZA BABA MEDIA</h1>
    
    <div class="card">
        <h3>Video Downloader</h3>
        <input type="text" id="vUrl" placeholder="Paste Link Here">
        <button onclick="process('download')">CHECK LINK</button>
        <div id="dlRes"></div>
    </div>

    <div class="card">
        <h3>Traffic Booster</h3>
        <input type="text" id="tUrl" placeholder="Paste Link for Boost">
        <button onclick="process('boost')">START BOOST</button>
        <div id="tRes"></div>
    </div>

    <script>
        const API = "https://usmansp-hanzababa-engine.hf.space";

        async function process(type) {
            const isDl = type === 'download';
            const url = document.getElementById(isDl ? "vUrl" : "tUrl").value;
            const resDiv = document.getElementById(isDl ? "dlRes" : "tRes");
            
            if(!url) return alert("Paste link first!");
            resDiv.innerText = "Processing...";

            try {
                const response = await fetch(`${API}/api/${isDl ? 'download' : 'test-load'}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();

                if(isDl && data.success) {
                    resDiv.innerHTML = `<a href="${data.download_url}" target="_blank" class="dl-btn">DOWNLOAD VIDEO NOW</a>`;
                } else {
                    resDiv.innerText = data.message || data.error || "Done!";
                }
            } catch (e) {
                resDiv.innerText = "Server Error. Try again.";
            }
        }
    </script>
</body>
</html>
