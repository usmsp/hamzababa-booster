<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>TK1.io | Social Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">
    <div class="max-w-lg mx-auto bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h1 class="text-3xl font-extrabold text-blue-500 mb-8 text-center">TK1.io Dashboard</h1>

        <div class="space-y-6">
            <div class="p-4 bg-gray-800 rounded-lg">
                <h2 class="text-green-400 mb-2">📥 Video Downloader</h2>
                <input id="v_url" type="text" placeholder="Paste link..." class="w-full p-2 rounded bg-gray-700 mb-2">
                <button onclick="dl()" class="w-full bg-green-600 p-2 rounded font-bold">Get Link</button>
                <div id="dl_res" class="mt-2 hidden"><a id="dl_btn" href="#" target="_blank" class="text-blue-300 underline">Download Now</a></div>
            </div>

            <div class="p-4 bg-gray-800 rounded-lg">
                <h2 class="text-blue-400 mb-2">🚀 TikTok Booster</h2>
                <input id="b_url" type="text" placeholder="TikTok Link..." class="w-full p-2 rounded bg-gray-700 mb-2">
                <button onclick="boost()" class="w-full bg-blue-600 p-2 rounded font-bold">Start Boost</button>
                <p id="msg" class="text-xs mt-2 text-gray-500 text-center"></p>
            </div>
        </div>
    </div>

    <script>
        const API = "https://usmansp-hanzababa-engine.hf.space";

        async function dl() {
            const url = document.getElementById('v_url').value;
            const res = await fetch(API+'/download', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url})});
            const data = await res.json();
            if(data.status==='success'){
                document.getElementById('dl_btn').href = data.link;
                document.getElementById('dl_res').classList.remove('hidden');
            }
        }

        async function boost() {
            const url = document.getElementById('b_url').value;
            document.getElementById('msg').innerText = "Working... check logs.";
            await fetch(API+'/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:url, count:50})});
        }
    </script>
</body>
</html>
