<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK1 MASTER | Hamza Baba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-4 font-sans">
    
    <h1 class="text-3xl font-black text-blue-500 my-8 italic tracking-tighter">TK1 MASTER</h1>

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl mb-6">
        <h2 class="text-center text-green-500 text-[10px] font-bold mb-4 tracking-widest uppercase">📥 Video Downloader</h2>
        <input id="v_url" type="text" placeholder="ویڈیو لنک یہاں ڈالیں..." 
            class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl mb-4 text-center outline-none focus:border-green-500">
        <button onclick="getTiktok()" id="main_btn" class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-2xl font-bold transition shadow-lg">GET VIDEO DETAILS</button>

        <div id="res_card" class="hidden mt-8 border-t border-slate-800 pt-6">
            <div class="flex items-center gap-4 bg-slate-800/50 p-4 rounded-2xl border border-slate-700 mb-6">
                <img id="u_avatar" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 shadow-md">
                <div class="overflow-hidden text-left">
                    <h3 id="u_name" class="font-bold text-blue-400 text-lg">@Username</h3>
                    <p id="v_title" class="text-[10px] text-gray-400 truncate">Video description...</p>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="save('hd')" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm shadow-lg">DOWNLOAD HD (NO WATERMARK)</button>
                <button onclick="save('sd')" class="w-full bg-slate-700 py-3 rounded-xl font-bold text-sm">NORMAL DOWNLOAD</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md bg-slate-900 border border-blue-900/30 rounded-3xl p-6 shadow-2xl">
        <h2 class="text-center text-blue-400 text-[10px] font-bold mb-4 tracking-widest uppercase">🚀 TikTok Stealth Booster</h2>
        <input id="b_url" type="text" placeholder="بوسٹنگ لنک یہاں ڈالیں..." 
            class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl mb-4 text-center outline-none focus:border-blue-500 text-sm">
        <button onclick="runBoost()" id="boost_btn" class="w-full bg-blue-700 hover:bg-blue-800 py-4 rounded-2xl font-bold transition shadow-lg">START BOOSTING</button>
        <p id="boost_status" class="text-[10px] text-center mt-3 text-gray-500 italic"></p>
    </div>

    <p class="text-[8px] text-center mt-10 text-gray-600 tracking-[0.4em] font-bold uppercase italic">Hamza Baba Global Tech</p>

    <script>
        const API = "https://usmansp-hamzababa-engine.hf.space";
        let dl_hd = ""; let dl_sd = "";

        async function getTiktok() {
            const val = document.getElementById('v_url').value;
            const btn = document.getElementById('main_btn');
            if(!val) return alert("لنک ڈالیں!");
            btn.innerText = "CONNECTING..."; btn.disabled = true;
            try {
                const r = await fetch(`${API}/download?url=${encodeURIComponent(val)}`);
                const data = await r.json();
                if(data.status === 'success') {
                    document.getElementById('u_avatar').src = data.avatar;
                    document.getElementById('u_name').innerText = "@" + data.author;
                    document.getElementById('v_title').innerText = data.title;
                    dl_hd = data.hd_link; dl_sd = data.link;
                    document.getElementById('res_card').classList.remove('hidden');
                    btn.innerText = "VIDEO READY!";
                    btn.disabled = false;
                }
            } catch(e) { alert("Engine Error!"); btn.disabled = false; btn.innerText = "GET VIDEO DETAILS"; }
        }

        async function save(type) {
            const link = type === 'hd' ? dl_hd : dl_sd;
            const b = event.target; const old = b.innerText; b.innerText = "SAVING...";
            try {
                const resp = await fetch(link);
                const blob = await resp.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `HamzaBaba_${Date.now()}.mp4`;
                document.body.appendChild(a); a.click();
                b.innerText = "SUCCESS!";
                setTimeout(() => b.innerText = old, 2000);
            } catch(e) { alert("Download Failed!"); b.innerText = old; }
        }

        async function runBoost() {
            const val = document.getElementById('b_url').value;
            const btn = document.getElementById('boost_btn');
            const status = document.getElementById('boost_status');
            if(!val) return alert("بوسٹنگ لنک ڈالیں!");
            btn.innerText = "INJECTING POWER...";
            status.innerText = ">>> MISSION STARTED <<<";
            try {
                await fetch(`${API}/start?url=${encodeURIComponent(val)}`);
                setTimeout(() => {
                    btn.innerText = "BOOSTING ACTIVE";
                    status.innerText = "بوسٹنگ کامیابی سے شروع ہو گئی ہے!";
                }, 2000);
            } catch(e) { btn.innerText = "START BOOSTING"; status.innerText = "Error!"; }
        }
    </script>
</body>
</html>
