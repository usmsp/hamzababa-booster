<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Baba | وی آئی پی بوسٹر</title>
    <style>
        :root { --gold: #FFD700; --dark: #111; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--dark); color: white; text-align: center; padding: 20px; margin: 0; }
        .container { background: #222; padding: 40px 20px; border-radius: 20px; border: 2px solid var(--gold); max-width: 600px; margin: 50px auto; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        h1 { color: var(--gold); font-size: 2.5em; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }
        input { width: 85%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; margin-bottom: 20px; outline: none; }
        button { background-color: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); background-color: #ffcc00; }
        #status { margin-top: 25px; font-size: 18px; font-weight: bold; }
        .loading { color: var(--gold); }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <h1>HAMZA BABA</h1>
    <p>عالمی سوشل میڈیا بوسٹر انجن</p>
    
    <input type="text" id="videoUrl" placeholder="ویڈیو کا لنک یہاں پیسٹ کریں...">
    <br>
    <button onclick="startEngine()">بوسٹ شروع کریں 🚀</button>
    
    <div id="status"></div>
</div>

<script>
    async function startEngine() {
        const videoUrl = document.getElementById('videoUrl').value;
        const statusDiv = document.getElementById('status');
        
        if(!videoUrl) {
            alert("پہلے ویڈیو کا لنک ڈالیں!");
            return;
        }

        statusDiv.className = "loading";
        statusDiv.innerText = "⏳ حمزہ بابا انجن سے رابطہ ہو رہا ہے...";

        try {
            // آپ کا اپنا بنایا ہوا انجن لنک
            const response = await fetch('https://usmansp-hamzababa-engine.hf.space/boost', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: videoUrl })
            });

            if(response.ok) {
                statusDiv.className = "success";
                statusDiv.innerText = "✅ انجن اسٹارٹ ہو گیا! کام شروع ہے عثمان بھائی۔";
                alert("کامیابی! آپ کا ٹاسک شروع کر دیا گیا ہے۔");
            } else {
                statusDiv.className = "error";
                statusDiv.innerText = "❌ معذرت، انجن ابھی مصروف ہے۔";
            }
        } catch (error) {
            statusDiv.className = "error";
            statusDiv.innerText = "❌ رابطہ نہیں ہو سکا! اپنا انٹرنیٹ چیک کریں۔";
            console.error(error);
        }
    }
</script>

</body>
</html>
