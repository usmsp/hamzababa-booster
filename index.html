<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hamza Baba - عالمی سوشل میڈیا بوسٹر</title>
    <meta name="description" content="حمزہ بابا انجن کے ذریعے اپنی ویڈیوز پر اصلی ویوز اور انگیجمنٹ حاصل کریں۔">
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ffcc00;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            width: 90%;
            max-width: 400px;
        }
        h1 { color: #ffcc00; font-size: 28px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
            text-align: left;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            transition: 0.3s;
        }
        button:hover { background: #e6b800; transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 14px; color: #ffcc00; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>HAMZA BABA</h1>
    <p>عالمی سوشل میڈیا بوسٹر انجن</p>
    
    <input type="text" id="videoUrl" placeholder="ویڈیو لنک یہاں ڈالیں..." required>
    <input type="number" id="viewCount" placeholder="تعداد (مثلاً 100)" value="100">
    
    <button onclick="startEngine()">🚀 بوسٹ شروع کریں</button>
    
    <div id="status">حمزہ بابا انجن سے رابطہ کے لیے تیار ہے...</div>
</div>

<script>
    async function startEngine() {
        const url = document.getElementById('videoUrl').value;
        const count = document.getElementById('viewCount').value;
        const statusDiv = document.getElementById('status');

        if (!url) {
            alert("براہ کرم ویڈیو لنک ڈالیں!");
            return;
        }

        statusDiv.innerHTML = "⏳ انجن سے رابطہ ہو رہا ہے، براہ کرم انتظار کریں...";

        try {
            // یہ ہے آپ کا نیا انجن لنک جو ہم نے ابھی ہگنگ فیس پر Running کیا ہے
            const response = await fetch('https://usmansp-hamzababa-engine.hf.space/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url, count: count })
            });

            if (response.ok) {
                statusDiv.innerHTML = "✅ کامیابی! آپ کا ٹاسک شروع کر دیا گیا ہے۔ <br>لاگز (Logs) میں چیک کریں، کام شروع ہو چکا ہوگا۔";
            } else {
                statusDiv.innerHTML = "❌ انجن فی حال مصروف ہے یا ری اسٹارٹ ہو رہا ہے۔ 1 منٹ بعد دوبارہ کوشش کریں۔";
            }
        } catch (error) {
            statusDiv.innerHTML = "❌ انجن سے رابطہ نہیں ہو سکا۔ <br>یقین کریں کہ ہگنگ فیس پر اسپیس Running حالت میں ہے۔";
            console.error(error);
        }
    }
</script>

</body>
</html>
