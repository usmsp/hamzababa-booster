<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK1 CORE | Hamza Baba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 rounded-3xl border-2 border-blue-600 p-8 shadow-2xl">
        <h1 class="text-center text-3xl font-black text-blue-500 mb-8">TK1 CORE</h1>

        <div class="mb-10">
            <h2 class="text-green-400 text-sm font-bold mb-2">📥 FAST DOWNLOADER</h2>
            <input id="v_url" type="text" placeholder="Paste link here..." class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none focus:border-green-500 border border-transparent">
            <button onclick="runDL()" id="btn" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase">Get Link</button>
            <div id="res" class="mt-4 hidden text-center">
                <a id="dl_link" href="#" target="_blank" class="bg-blue-600 px-8 py-3 rounded-full font-bold">⚡ CLICK TO SAVE</a>
            </div>
        </div>

        <div>
            <h2 class="text-blue-400 text-sm font-bold mb-2">🚀 STEALTH BOOSTER</h2>
            <input id="b_url" type="text" placeholder="TikTok Link..." class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none">
            <button onclick="runBoost()" class="w-full bg-blue-700 py-4 rounded-xl font-bold uppercase">Start 50+ Views</button>
            <p id="msg" class="text-[10px] text-center mt-3 text-gray-500"></p>
        </div>
    </div>

    <script>
        // عثمان صاحب، یہ لنک اب بالکل لاک کر دیا گیا ہے
        const API = "https://usmansp-hanzababa-engine.hf.space";

        async function runDL() {
            const val = document.getElementById('v_url').value;
            const btn = document.getElementById('btn');
            if(!val) return alert("Link missing!");
            
            btn.innerText = "CONNECTING...";
            try {
                const r = await fetch(`${API}/download`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: val})
                });
                const d = await r.json();
                if(d.status === 'success') {
                    document.getElementById('dl_link').href = d.link;
                    document.getElementById('res').classList.remove('hidden');
                    btn.innerText = "DONE!";
                } else { alert("Error from Engine"); btn.innerText = "RETRY"; }
            } catch(e) { 
                alert("SERVER OFFLINE! Please Refresh Hugging Face.");
                btn.innerText = "ERROR";
            }
        }

        async function runBoost() {
            const val = document.getElementById('b_url').value;
            if(!val) return alert("Link missing!");
            document.getElementById('msg').innerText = "WORKING...";
            try {
                await fetch(`${API}/start`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: val})
                });
                document.getElementById('msg').innerText = "STARTED SUCCESSFULLY";
            } catch(e) { document.getElementById('msg').innerText = "FAILED"; }
        }
    </script>
</body>
</html>
