<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK1 CORE | Hamza Baba</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 rounded-3xl border-2 border-blue-600 p-8 shadow-2xl">
        <h1 class="text-center text-3xl font-black text-blue-500 mb-8">TK1 CORE</h1>

        <div class="mb-10">
            <h2 class="text-green-400 text-sm font-bold mb-2 text-left">📥 FAST DOWNLOADER</h2>
            <input id="v_url" type="text" placeholder="Paste link here..." class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none border border-transparent focus:border-green-500">
            <button onclick="runDL()" id="btn_dl" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase">Get Link</button>
            <div id="res_area" class="mt-4 hidden text-center">
                <a id="final_link" href="#" target="_blank" class="bg-blue-600 px-8 py-3 rounded-full font-bold inline-block">⚡ CLICK TO SAVE</a>
            </div>
        </div>

        <div>
            <h2 class="text-blue-400 text-sm font-bold mb-2 text-left">🚀 STEALTH BOOSTER</h2>
            <input id="b_url" type="text" placeholder="TikTok Link..." class="w-full bg-slate-800 p-4 rounded-xl mb-3 outline-none">
            <button onclick="runBoost()" id="btn_boost" class="w-full bg-blue-700 py-4 rounded-xl font-bold uppercase">Start 50+ Views</button>
            <p id="status_msg" class="text-[10px] text-center mt-3 text-gray-500 font-mono"></p>
        </div>
    </div>

    <script>
        // عثمان صاحب، میں نے اب 'allorigins' کا استعمال کیا ہے جو بلاک نہیں ہوگا
        const API_TARGET = "https://usmansp-hanzababa-engine.hf.space";
        const PROXY = "https://api.allorigins.win/get?url=";

        async function runDL() {
            const val = document.getElementById('v_url').value;
            const btn = document.getElementById('btn_dl');
            if(!val) return alert("Link missing!");
            
            btn.innerText = "CONNECTING...";
            btn.disabled = true;

            try {
                // نیا طریقہ: یہ سرور کو بائی پاس کرے گا
                const response = await fetch(PROXY + encodeURIComponent(API_TARGET + "/download?url=" + val));
                const data = await response.json();
                const result = JSON.parse(data.contents);

                if(result.status === 'success') {
                    document.getElementById('final_link').href = result.link;
                    document.getElementById('res_area').classList.remove('hidden');
                    btn.innerText = "SUCCESS!";
                } else {
                    alert("Engine Busy - Try Again");
                    btn.innerText = "RETRY";
                    btn.disabled = false;
                }
            } catch(error) { 
                alert("Please check if Hugging Face is 'Running' and Refresh Page.");
                btn.innerText = "ERROR";
                btn.disabled = false;
            }
        }

        async function runBoost() {
            const val = document.getElementById('b_url').value;
            if(!val) return alert("Link missing!");
            document.getElementById('status_msg').innerText = ">>> INITIATING... <<<";
            try {
                await fetch(PROXY + encodeURIComponent(API_TARGET + "/start?url=" + val));
                document.getElementById('status_msg').innerText = ">>> STARTED <<<";
            } catch(e) { document.getElementById('status_msg').innerText = ">>> FAILED <<<"; }
        }
    </script>
</body>
</html>
