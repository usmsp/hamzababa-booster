<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK1 CORE | Hamza Baba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        .cyber { font-family: 'Orbitron', sans-serif; }
        .glow-blue { box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900 rounded-3xl border-2 border-blue-600 p-8 glow-blue">
        <h1 class="text-center text-4xl font-black text-blue-500 mb-8 cyber italic">TK1 CORE</h1>

        <div class="mb-10 border-b border-slate-800 pb-8">
            <h2 class="text-green-400 text-[10px] font-bold mb-3 tracking-widest uppercase">📥 TikTok Video Downloader</h2>
            <input id="v_url" type="text" placeholder="ویڈیو لنک یہاں ڈالیں..." 
                class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none border border-transparent focus:border-green-500 text-left">
            <button onclick="runDL()" id="btn_dl" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase hover:bg-green-700 transition active:scale-95">Get Video</button>
            
            <div id="res_area" class="mt-6 hidden text-center animate-bounce">
                <a id="final_link" href="#" target="_blank" class="bg-blue-600 px-10 py-4 rounded-full font-bold inline-block shadow-lg">⚡ DOWNLOAD NOW</a>
            </div>
        </div>

        <div>
            <h2 class="text-blue-400 text-[10px] font-bold mb-3 tracking-widest uppercase">🚀 TikTok Stealth Booster</h2>
            <input id="b_url" type="text" placeholder="بوسٹنگ لنک یہاں ڈالیں..." 
                class="w-full bg-slate-800 p-4 rounded-xl mb-4 outline-none border border-transparent focus:border-blue-500 text-left">
            <button onclick="runBoost()" id="btn_boost" class="w-full bg-blue-700 py-4 rounded-xl font-bold uppercase hover:bg-blue-800 transition active:scale-95">Start Boosting</button>
            <p id="status_msg" class="text-[10px] text-center mt-4 text-gray-500 font-mono"></p>
        </div>

        <p class="text-[9px] text-center mt-8 text-gray-600 tracking-widest uppercase font-bold">Hamza Baba Global Tech</p>
    </div>

    <script>
        // عثمان صاحب، یہ وہی لنک ہے جو آپ کی تصویر 1002436431 میں تھا
        const API = "https://usmansp-hamzababa-engine.hf.space";

        async function runDL() {
            const val = document.getElementById('v_url').value;
            const btn = document.getElementById('btn_dl');
            if(!val) return alert("لنک غائب ہے!");
            btn.innerText = "CONNECTING ENGINE...";
            btn.disabled = true;

            try {
                const r = await fetch(`${API}/download?url=${encodeURIComponent(val)}`);
                const data = await r.json();
                if(data.status === 'success') {
                    document.getElementById('final_link').href = data.link;
                    document.getElementById('res_area').classList.remove('hidden');
                    btn.innerText = "LINK FOUND!";
                } else { alert("سرور ریجیکٹ کر رہا ہے۔"); resetBtn(btn, "RETRY"); }
            } catch(e) { alert("کنکشن فیل! ہگنگ فیس چیک کریں۔"); resetBtn(btn, "ERROR"); }
        }

        async function runBoost() {
            const val = document.getElementById('b_url').value;
            const msg = document.getElementById('status_msg');
            const btn = document.getElementById('btn_boost');
            if(!val) return alert("بوسٹنگ لنک ڈالیں!");
            
            msg.innerText = ">>> INITIATING STEALTH PROTOCOL <<<";
            btn.disabled = true;

            try {
                const r = await fetch(`${API}/start?url=${encodeURIComponent(val)}`);
                const data = await r.json();
                msg.innerText = ">>> TARGET LOCKED: BOOSTING STARTED <<<";
            } catch(e) { msg.innerText = ">>> CONNECTION ERROR: RE-TRYING <<<"; btn.disabled = false; }
        }

        function resetBtn(btn, txt) { btn.innerText = txt; btn.disabled = false; }
    </script>
</body>
</html>
