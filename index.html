<div class="text-center mt-10">
    <h1 class="text-5xl font-black italic text-blue-500">HAMZA BABA</h1>
    <p class="text-xs text-gray-500 tracking-widest mt-2">GLOBAL BUSINESS HUB</p>
</div>

<div class="max-w-md mx-auto bg-slate-900/80 p-8 rounded-[2.5rem] mt-10 border border-blue-500/20">
    <h3 class="text-blue-400 text-[10px] font-bold mb-4 uppercase italic">1. All-in-One Downloader (FB/YT/TK)</h3>
    <input id="v_url" type="text" placeholder="لنک یہاں ڈالیں..." class="w-full bg-black border border-slate-800 p-4 rounded-xl text-sm mb-4">
    <button onclick="getTiktok()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs">GET VIDEO</button>
    <div id="res_card" class="hidden mt-6 bg-black/50 p-4 rounded-2xl border border-white/5">
        <img id="u_avatar" class="w-12 h-12 rounded-full mx-auto mb-2 border border-blue-500">
        <p id="u_name" class="text-center text-xs font-bold text-blue-400"></p>
        <button onclick="save('hd')" class="w-full bg-white text-black py-2 rounded-lg font-bold text-[10px] mt-4">DOWNLOAD NOW</button>
    </div>
</div>

<div class="max-w-md mx-auto bg-slate-900/80 p-8 rounded-[2.5rem] mt-6 border border-red-500/20">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-red-500 text-[10px] font-bold uppercase italic">2. Stealth Views Booster</h3>
        <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
    </div>
    <input id="b_url" type="text" placeholder="بوسٹنگ لنک یہاں ڈالیں..." class="w-full bg-black border border-slate-800 p-4 rounded-xl text-sm mb-4">
    <button onclick="runBoost()" id="boost_btn" class="w-full bg-red-600 py-3 rounded-xl font-black text-xs">ACTIVATE SYSTEM BOOST</button>
    <p id="boost_status" class="text-[9px] text-center mt-3 text-gray-400"></p>
</div>
