<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Baba Media</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #4f46e5; color: white; font-weight: bold; cursor: pointer; }
        #res { margin-top: 20px; font-weight: bold; }
        .dl-link { background: #22c55e; color: white; padding: 12px; border-radius: 8px; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>HAMZA BABA MEDIA</h1>
    <div class="card">
        <input type="text" id="link" placeholder="Paste Video Link Here...">
        <button onclick="start()">GET VIDEO</button>
        <div id="res"></div>
    </div>

<script>
    const API = "https://usmansp-hamzababa-engine.hf.space";

    async function start() {
        const val = document.getElementById("link").value;
        const res = document.getElementById("res");
        if(!val) return alert("Link paste karen!");

        res.innerHTML = "Processing...";
        
        try {
            const response = await fetch(`${API}/api/download`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: val })
            });
            const data = await response.json();

            if (data.success) {
                res.innerHTML = `<a href="${data.download_url}" class="dl-link" download="video.mp4">DOWNLOAD NOW</a>`;
            } else {
                res.innerText = "Error: Video is protected.";
            }
        } catch (e) {
            res.innerText = "Server error. Refresh HF Space.";
        }
    }
</script>
</body>
</html>
