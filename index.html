<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hamza Baba Media</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    input, button {
      padding: 12px;
      margin: 10px;
      width: 90%;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #6366f1;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Hamza Baba Media</h1>

  <!-- Downloader Section -->
  <div class="card">
    <h2>Video Downloader</h2>
    <input type="text" id="videoUrl" placeholder="Paste Facebook / TikTok / YouTube URL">
    <button onclick="downloadVideo()">Download</button>
    <p id="downloadResult"></p>
  </div>

  <!-- Safe Load Testing Tool -->
  <div class="card">
    <h2>Traffic Tester (Safe)</h2>
    <input type="text" id="testUrl" placeholder="Your own API URL only">
    <button onclick="testLoad()">Run Test</button>
    <p id="testResult"></p>
  </div>
</div>

<script>
const API_BASE = "https://your-huggingface-space-url";

async function downloadVideo() {
  const url = document.getElementById("videoUrl").value;
  const result = document.getElementById("downloadResult");

  result.innerText = "Fetching...";

  try {
    const res = await fetch(`${API_BASE}/api/download`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    if (data.success) {
      result.innerHTML = `<a href="${data.download_url}" target="_blank">Download Video</a>`;
    } else {
      result.innerText = data.error;
    }
  } catch (err) {
    result.innerText = "Server error";
  }
}

async function testLoad() {
  const url = document.getElementById("testUrl").value;
  const result = document.getElementById("testResult");

  result.innerText = "Running test...";

  try {
    const res = await fetch(`${API_BASE}/api/test-load`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });

    const data = await res.json();
    result.innerText = data.message;
  } catch (err) {
    result.innerText = "Error running test";
  }
}
</script>

</body>
</html>
